# Reverse proxy for DLC Manager backoffice (only needed if you run nginx).
# If you already use OpenLiteSpeed (CyberPanel), see deploy/openlitespeed.md instead.
#
# Install:
#   sudo cp deploy/nginx-dlc-manager.conf /etc/nginx/sites-available/dlc-manager
#   sudo ln -sf /etc/nginx/sites-available/dlc-manager /etc/nginx/sites-enabled/dlc-manager
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name 187.124.215.103;

    # Redirect everything to HTTPS once a cert is installed.
    # Comment the 3 lines below if you only want HTTP for now.
    # return 301 https://$host$request_uri;

    client_max_body_size 15m;   # allow photo uploads (server limit = 10m)

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

