<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DLC Manager - Back Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Stats */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .stat-box {
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .refresh-time {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .refresh-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            font-size: 13px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        /* Tabs */
        .tabs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            background: white;
            border-bottom: 2px solid #eee;
            flex-shrink: 0;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #f9f9f9;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tabs-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-pane {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .tab-pane.active {
            display: flex;
            flex-direction: column;
        }

        /* Content */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f5f5f5;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .device-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .device-item {
            padding: 12px;
            border-left: 3px solid #667eea;
            background: #f9f9f9;
            border-radius: 4px;
            font-size: 12px;
        }

        .device-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .device-detail {
            color: #666;
            margin: 2px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-offline {
            background: #ffebee;
            color: #c62828;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
        }

        .aisle-item {
            background: white;
            border: 2px solid #eee;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            transition: all 0.2s;
        }

        .aisle-item:hover {
            border-color: #667eea;
            background: #f9f9f9;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .aisle-item.dragging {
            opacity: 0.5;
            background: #f0f0f0;
        }

        .aisle-item.drag-over {
            border-color: #667eea;
            background: #f5f5ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .aisle-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .aisle-drag-handle {
            color: #999;
            font-size: 20px;
            flex-shrink: 0;
        }

        .aisle-info {
            flex: 1;
        }

        .aisle-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .aisle-order {
            font-size: 11px;
            color: #999;
        }

        .aisle-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
            min-height: 36px;
            min-width: 36px;
        }

        .btn-delete:hover {
            background: #ef5350;
            color: white;
        }

        .btn-move {
            background: #eef0ff;
            color: #4a55a8;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: background 0.2s;
            min-height: 36px;
            min-width: 36px;
        }

        .btn-move:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .btn-move:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        .grid-section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .grid-section table {
            font-size: 12px;
        }

        .grid-section th,
        .grid-section td {
            padding: 6px 8px;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 250px;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .tab-button {
                font-size: 12px;
                padding: 12px;
            }
        }

        @media (max-width: 768px) {
            /* Release the rigid full-height layout so the page can scroll. */
            html, body {
                overflow: auto;
                height: auto;
            }

            body {
                min-height: 100vh;
                /* iOS Safari: account for the dynamic address/tool bar. */
                min-height: -webkit-fill-available;
                min-height: 100dvh;
            }

            header {
                padding: 10px 16px;
                /* Respect the iPhone notch / status bar. */
                padding-top: calc(10px + env(safe-area-inset-top));
                padding-left: calc(16px + env(safe-area-inset-left));
                padding-right: calc(16px + env(safe-area-inset-right));
                /* NOT sticky on mobile — frees vertical space when scrolling. */
            }

            /* Prevent iOS Safari from zooming in when focusing form inputs. */
            input, select, textarea {
                font-size: 16px !important;
            }

            h1 {
                font-size: 18px;
                margin-bottom: 2px;
            }

            .subtitle {
                font-size: 11px;
            }

            .main-content {
                flex-direction: column;
                overflow: visible;
                flex: none;
            }

            /* On mobile, show tabs first (the actual content) and push the
               stats sidebar below. The desktop order is unaffected. */
            .tabs-container { order: 1; }
            .sidebar        { order: 2; }

            /* Compact stats: a single row of 4 small tiles + a refresh strip. */
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #eee;
                padding: 12px;
                overflow: visible;
            }

            #stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .stat-box {
                padding: 10px 6px;
                margin-bottom: 0;
                border-radius: 6px;
            }

            .stat-number {
                font-size: 20px;
                margin: 4px 0;
            }

            .stat-label {
                font-size: 10px;
            }

            .refresh-btn {
                margin-top: 10px;
                padding: 8px;
            }

            .refresh-time {
                margin-top: 8px;
                padding-top: 8px;
            }

            /* Tabs: horizontally scrollable instead of wrapping & cramped. */
            .tabs-container {
                overflow: visible;
            }

            .tabs-header {
                position: sticky;
                top: 0;
                z-index: 9;
                overflow-x: auto;
                overflow-y: hidden;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            }

            .tabs-header::-webkit-scrollbar {
                display: none;
            }

            .tab-button {
                flex: 0 0 auto;
                padding: 12px 14px;
                font-size: 13px;
                white-space: nowrap;
            }

            .tabs-content {
                overflow: visible;
            }

            .tab-pane {
                padding: 14px;
                overflow: visible;
            }

            .tab-pane.active {
                display: block;
            }

            /* Tables: allow horizontal scroll rather than overflowing the viewport. */
            .tab-pane table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
            }

            #products,
            #checks,
            #history,
            #aislesList {
                overflow: visible;
            }

            .aisle-item {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .aisle-buttons {
                justify-content: flex-end;
            }
        }

        @media (max-width: 420px) {
            #stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .tab-button {
                padding: 10px 12px;
                font-size: 12px;
            }

            h1 {
                font-size: 16px;
            }

        }
    </style>
</head>
<body>
    <header>
        <h1>📊 DLC Manager - Back Office</h1>
        <p class="subtitle">Gestion centralisée des données de synchronisation</p>
    </header>

    <div class="main-content">
        <!-- SIDEBAR STATS -->
        <div class="sidebar">
            <div id="stats"></div>
            <button class="refresh-btn" onclick="loadAllData()">🔄 Actualiser</button>
            <div class="refresh-time" id="refreshTime"></div>
        </div>

        <!-- TABS CONTENT -->
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" onclick="switchTab('appareils')">📱 Appareils</button>
                <button class="tab-button" onclick="switchTab('rayons')">🏪 Rayons</button>
                <button class="tab-button" onclick="switchTab('produits')">📦 Produits</button>
                <button class="tab-button" onclick="switchTab('verifications')">✅ Vérifications</button>
                <button class="tab-button" onclick="switchTab('historique')">🔄 Historique</button>
            </div>

            <div class="tabs-content">
                <!-- TAB: Appareils -->
                <div id="appareils" class="tab-pane active">
                    <div class="section-title">📱 Appareils Synchronisés</div>
                    <div id="devices" class="device-list"></div>
                </div>

                <!-- TAB: Rayons -->
                <div id="rayons" class="tab-pane">
                    <div class="section-title">🏪 Rayons</div>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                        <input type="text" id="aisleNameInput" placeholder="Nom du rayon..." style="flex: 1; min-width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;" onkeypress="if(event.key === 'Enter') addAisle()">
                        <button onclick="addAisle()" style="background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">➕ Ajouter</button>
                    </div>
                    <div id="aislesList" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Produits -->
                <div id="produits" class="tab-pane">
                    <div class="section-title">📦 Produits</div>
                    <div id="message"></div>
                    <div id="products" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Vérifications -->
                <div id="verifications" class="tab-pane">
                    <div class="section-title">✅ Vérifications</div>
                    <div id="checks" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Historique -->
                <div id="historique" class="tab-pane">
                    <div class="section-title">🔄 Historique de Synchronisation</div>
                    <div id="history" style="flex: 1; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastRefresh = null;

        function switchTab(tabName) {
            // Hide all panes
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected pane
            document.getElementById(tabName).classList.add('active');
            if (event && event.target) {
                event.target.classList.add('active');
            }

            // Update URL with anchor
            window.history.pushState(null, null, `#${tabName}`);
        }

        function restoreTabFromURL() {
            const hash = window.location.hash.substring(1);
            const validTabs = ['appareils', 'rayons', 'produits', 'verifications', 'historique'];

            if (hash && validTabs.includes(hash)) {
                switchTab(hash);
            }
        }

        async function loadAllData() {
            try {
                const fullSync = await fetch('/api/sync/full').then(r => r.json());
                const devices = await fetch('/api/sync/devices').then(r => r.json());
                const aisles = await fetch('/api/aisles').then(r => r.json());
                const history = await fetch('/api/sync/history').then(r => r.json());

                displayStats(fullSync, devices, aisles);
                displayDevices(devices);
                displayAisles(aisles);
                displayProducts(fullSync.products);
                displayChecks(fullSync.checks);
                displayHistory(history);

                lastRefresh = new Date();
                updateRefreshTime();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function updateRefreshTime() {
            if (lastRefresh) {
                const time = lastRefresh.toLocaleTimeString('fr-FR');
                document.getElementById('refreshTime').textContent = `Mis à jour: ${time}`;
            }
        }

        function displayStats(fullSync, devices, aisles) {
            const stats = document.getElementById('stats');
            const deviceCount = devices.devices ? devices.devices.length : 0;
            const productCount = fullSync.products ? fullSync.products.length : 0;
            const checkCount = fullSync.checks ? fullSync.checks.length : 0;
            const aisleCount = aisles ? aisles.length : 0;

            stats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Produits</div>
                    <div class="stat-number">${productCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Rayons</div>
                    <div class="stat-number">${aisleCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Vérifications</div>
                    <div class="stat-number">${checkCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Appareils</div>
                    <div class="stat-number">${deviceCount}</div>
                </div>
            `;
        }

        function displayDevices(data) {
            const devices = document.getElementById('devices');
            const deviceList = data.devices || [];

            if (deviceList.length === 0) {
                devices.innerHTML = '<div class="empty">Aucun appareil enregistré</div>';
                return;
            }

            let html = '';
            for (const device of deviceList) {
                const lastSeen = device.last_seen ? new Date(device.last_seen).toLocaleString('fr-FR') : 'N/A';
                const isActive = device.is_active ? 'Actif' : 'Inactif';
                const statusClass = device.is_active ? 'status-active' : 'status-offline';

                html += `
                    <div class="device-item">
                        <div class="device-name">${device.device_name}</div>
                        <div class="device-detail">🆔 <code>${device.device_id}</code></div>
                        <div class="device-detail">📱 ${device.app_version}</div>
                        <div class="device-detail">⏱️ ${lastSeen}</div>
                        <div class="device-detail">
                            <span class="status-badge ${statusClass}">${isActive}</span>
                        </div>
                    </div>
                `;
            }
            devices.innerHTML = html;
        }

        function displayAisles(aisles) {
            const container = document.getElementById('aislesList');
            const aislelist = aisles || [];

            if (aislelist.length === 0) {
                container.innerHTML = '<div class="empty">Aucun rayon</div>';
                return;
            }

            // Sort by order_index so ▲/▼ buttons can swap with neighbours.
            const sorted = [...aislelist].sort((a, b) => (a.order_index || 0) - (b.order_index || 0));

            let html = '';
            sorted.forEach((aisle, idx) => {
                const safeName = aisle.name.replace(/'/g, "\\'");
                const isFirst = idx === 0;
                const isLast = idx === sorted.length - 1;
                html += `
                    <div class="aisle-item" draggable="true" data-id="${aisle.id}" data-order="${aisle.order_index}">
                        <div class="aisle-content">
                            <div class="aisle-drag-handle" aria-hidden="true">⋮⋮</div>
                            <div class="aisle-info">
                                <div class="aisle-name" onclick="editAisleName(${aisle.id}, '${safeName}')">
                                    ${aisle.name}
                                    <span style="color: #999; font-size: 11px; margin-left: 5px;">(cliquez pour éditer)</span>
                                </div>
                                <div class="aisle-order">Ordre: ${aisle.order_index}</div>
                            </div>
                        </div>
                        <div class="aisle-buttons">
                            <button class="btn-move" onclick="moveAisle(${aisle.id}, -1)" ${isFirst ? 'disabled' : ''} aria-label="Monter">▲</button>
                            <button class="btn-move" onclick="moveAisle(${aisle.id}, 1)" ${isLast ? 'disabled' : ''} aria-label="Descendre">▼</button>
                            <button class="btn-delete" onclick="deleteAisle(${aisle.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            setupDragAndDrop();
        }

        function displayProducts(products) {
            const container = document.getElementById('products');
            const productList = products || [];

            if (productList.length === 0) {
                container.innerHTML = '<div class="empty">Aucun produit</div>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Nom</th><th>Catégorie</th><th>Code-barres</th></tr></thead><tbody>';
            for (const product of productList.slice(0, 100)) {
                html += `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>${product.barcode || '-'}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function displayChecks(checks) {
            const container = document.getElementById('checks');
            const checkList = checks || [];

            if (checkList.length === 0) {
                container.innerHTML = '<div class="empty">Aucune vérification</div>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Produit</th><th>Date</th><th>Statut</th><th>DLC</th></tr></thead><tbody>';
            for (const check of checkList.slice(0, 100)) {
                const statusClass = check.status === 'ok' ? '✅' : '❌';
                html += `
                    <tr>
                        <td>${check.id}</td>
                        <td>${check.product_id}</td>
                        <td>${check.check_date}</td>
                        <td>${statusClass} ${check.status}</td>
                        <td>${check.next_expiry_date || '-'}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function displayHistory(data) {
            const container = document.getElementById('history');
            const history = data.history || [];

            if (history.length === 0) {
                container.innerHTML = '<div class="empty">Aucun historique</div>';
                return;
            }

            let html = '<table><thead><tr><th>Appareil</th><th>Table</th><th>Op</th><th>ID</th><th>Date</th></tr></thead><tbody>';
            for (const entry of history.slice(0, 100)) {
                const date = new Date(entry.created_at).toLocaleString('fr-FR');
                const op = entry.operation === 'CREATE' ? '➕' : entry.operation === 'UPDATE' ? '✏️' : '🗑️';
                const deviceId = entry.device_id.substring(0, 8);
                html += `
                    <tr>
                        <td><code>${deviceId}...</code></td>
                        <td>${entry.table_name}</td>
                        <td>${op}</td>
                        <td>${entry.entity_id}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        let draggedElement = null;

        function setupDragAndDrop() {
            const items = document.querySelectorAll('.aisle-item');
            items.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', (e) => {
                    item.classList.remove('dragging');
                    items.forEach(i => i.classList.remove('drag-over'));
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (item !== draggedElement) {
                        item.classList.add('drag-over');
                    }
                });

                item.addEventListener('dragleave', (e) => {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (item !== draggedElement) {
                        swapAisles(draggedElement, item);
                    }
                });
            });
        }

        function swapAisles(fromItem, toItem) {
            const fromOrder = parseInt(fromItem.dataset.order);
            const toOrder = parseInt(toItem.dataset.order);
            const fromId = parseInt(fromItem.dataset.id);
            const toId = parseInt(toItem.dataset.id);

            // Swap orders visually
            fromItem.dataset.order = toOrder;
            toItem.dataset.order = fromOrder;
            fromItem.querySelector('.aisle-order').textContent = `Ordre: ${toOrder}`;
            toItem.querySelector('.aisle-order').textContent = `Ordre: ${fromOrder}`;

            // Reorder in DOM
            const parent = fromItem.parentNode;
            if (fromOrder < toOrder) {
                toItem.parentNode.insertBefore(fromItem, toItem.nextSibling);
            } else {
                toItem.parentNode.insertBefore(fromItem, toItem);
            }

            // Update on server
            updateAisleOrder(fromId, toOrder);
            updateAisleOrder(toId, fromOrder);
        }

        async function addAisle() {
            const input = document.getElementById('aisleNameInput');
            const name = input.value.trim();

            if (!name) {
                alert('Veuillez entrer un nom de rayon');
                return;
            }

            try {
                const token = await getToken();
                const response = await fetch('/api/aisles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        name,
                        order_index: 999 // Will be reordered
                    })
                });

                if (response.ok) {
                    input.value = '';
                    await loadAllData();
                } else {
                    alert('Erreur lors de la création du rayon');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function moveAisle(id, direction) {
            // Re-read current order from DOM (in case user moved several before refresh).
            const items = Array.from(document.querySelectorAll('#aislesList .aisle-item'));
            const idx = items.findIndex(el => parseInt(el.dataset.id) === id);
            if (idx === -1) return;
            const target = idx + direction;
            if (target < 0 || target >= items.length) return;

            const a = items[idx];
            const b = items[target];
            const aId = parseInt(a.dataset.id);
            const bId = parseInt(b.dataset.id);
            const aOrder = parseInt(a.dataset.order);
            const bOrder = parseInt(b.dataset.order);

            // Update both on the server, then refresh the list.
            try {
                await Promise.all([
                    updateAisleOrder(aId, bOrder),
                    updateAisleOrder(bId, aOrder),
                ]);
                await loadAllData();
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function deleteAisle(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce rayon ?')) {
                return;
            }

            try {
                const token = await getToken();
                const response = await fetch(`/api/aisles/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    await loadAllData();
                } else {
                    alert('Erreur lors de la suppression');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function updateAisleOrder(id, order) {
            try {
                const token = await getToken();
                await fetch(`/api/aisles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ order_index: order })
                });
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function editAisleName(id, currentName) {
            const newName = prompt('Nouveau nom du rayon:', currentName);
            if (newName !== null && newName.trim()) {
                updateAisleName(id, newName.trim());
            }
        }

        async function updateAisleName(id, name) {
            try {
                const token = await getToken();
                const response = await fetch(`/api/aisles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name })
                });

                if (response.ok) {
                    await loadAllData();
                } else {
                    alert('Erreur lors de la modification');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function getToken() {
            // For back office, we use the hardcoded token
            // In production, implement proper authentication
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: 'Honfleur', password: 'Honfleur' })
            });
            const data = await response.json();
            return data.token;
        }

        // Charger au démarrage
        window.addEventListener('load', () => {
            restoreTabFromURL();
            loadAllData();

            // Event listener pour la touche Entrée dans le champ d'ajout de rayon
            const aisleInput = document.getElementById('aisleNameInput');
            if (aisleInput) {
                aisleInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addAisle();
                    }
                });
            }
        });

        // Gérer les changements d'ancre (boutons précédent/suivant)
        window.addEventListener('hashchange', restoreTabFromURL);

        // Auto-refresh toutes les 30 secondes
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
