<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLC Manager - Back Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #0D9488 0%, #0D7377 100%);
            color: white;
            padding: 15px 30px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Tabs */
        .tabs-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            background: white;
            border-bottom: 2px solid #eee;
            flex-shrink: 0;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            background: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-button:hover {
            background: #f9f9f9;
        }

        .tab-button.active {
            color: #0D9488;
            border-bottom-color: #0D9488;
        }

        .tab-count {
            background: #0D9488;
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 4px;
            display: inline-block;
            min-width: 20px;
            text-align: center;
        }

        .tab-button.active .tab-count {
            background: #0D7377;
        }

        .tabs-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-pane {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .tab-pane.active {
            display: flex;
            flex-direction: column;
        }

        /* Content */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f5f5f5;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .device-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .device-item {
            padding: 12px;
            border-left: 3px solid #0D9488;
            background: #f9f9f9;
            border-radius: 4px;
            font-size: 12px;
        }

        .device-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .device-detail {
            color: #666;
            margin: 2px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-offline {
            background: #ffebee;
            color: #c62828;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 13px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
        }

        .aisle-item {
            background: white;
            border: 2px solid #eee;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            transition: all 0.2s;
        }

        .aisle-item:hover {
            border-color: #0D9488;
            background: #f9f9f9;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .aisle-item.dragging {
            opacity: 0.5;
            background: #f0f0f0;
        }

        .aisle-item.drag-over {
            border-color: #0D9488;
            background: #f5f5ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .aisle-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .aisle-drag-handle {
            color: #999;
            font-size: 20px;
            flex-shrink: 0;
        }

        .aisle-info {
            flex: 1;
        }

        .aisle-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .aisle-order {
            font-size: 11px;
            color: #999;
        }

        .aisle-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: #ef5350;
            color: white;
        }

        .btn-move {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-move:hover {
            background: #0D9488;
            color: white;
        }

        .btn-move:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        .grid-section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .grid-section table {
            font-size: 12px;
        }

        .grid-section th,
        .grid-section td {
            padding: 6px 8px;
        }

        @media (max-width: 1024px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .tab-button {
                font-size: 12px;
                padding: 12px;
            }
        }

        @media (max-width: 768px) {
            .tabs-header {
                flex-wrap: wrap;
            }

            .tab-button {
                flex: 0 1 25%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 DLC Manager - Back Office</h1>
        <p class="subtitle">Gestion centralisée des données de synchronisation</p>
    </header>

    <div class="main-content">
        <!-- TABS CONTENT -->
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" onclick="switchTab('appareils')">📱 Appareils <span class="tab-count" id="count-appareils">0</span></button>
                <button class="tab-button" onclick="switchTab('rayons')">🏪 Rayons <span class="tab-count" id="count-rayons">0</span></button>
                <button class="tab-button" onclick="switchTab('produits')">📦 Produits <span class="tab-count" id="count-produits">0</span></button>
                <button class="tab-button" onclick="switchTab('verifications')">✅ Vérifications <span class="tab-count" id="count-verifications">0</span></button>
                <button class="tab-button" onclick="switchTab('historique')">🔄 Historique <span class="tab-count" id="count-historique">0</span></button>
            </div>

            <div class="tabs-content">
                <!-- TAB: Appareils -->
                <div id="appareils" class="tab-pane active">
                    <div class="section-title">📱 Appareils Synchronisés</div>
                    <div id="devices" class="device-list"></div>
                </div>

                <!-- TAB: Rayons -->
                <div id="rayons" class="tab-pane">
                    <div class="section-title">🏪 Rayons</div>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                        <input type="text" id="aisleNameInput" placeholder="Nom du rayon..." style="flex: 1; min-width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
                        <button onclick="addAisle()" style="background: #0D9488; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px;">➕ Ajouter</button>
                    </div>
                    <div id="aislesList" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Produits -->
                <div id="produits" class="tab-pane">
                    <div class="section-title">📦 Produits</div>
                    <div id="message"></div>
                    <div id="products" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Vérifications -->
                <div id="verifications" class="tab-pane">
                    <div class="section-title">✅ Vérifications</div>
                    <div id="checks" style="flex: 1; overflow-y: auto;"></div>
                </div>

                <!-- TAB: Historique -->
                <div id="historique" class="tab-pane">
                    <div class="section-title">🔄 Historique de Synchronisation</div>
                    <div id="history" style="flex: 1; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastRefresh = null;

        function switchTab(tabName) {
            // Hide all panes
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected pane
            document.getElementById(tabName).classList.add('active');
            if (event && event.target) {
                event.target.classList.add('active');
            }
        }

        async function loadAllData() {
            try {
                const fullSync = await fetch('/api/sync/full').then(r => r.json());
                const devices = await fetch('/api/sync/devices').then(r => r.json());
                const aisles = await fetch('/api/aisles').then(r => r.json());
                const history = await fetch('/api/sync/history').then(r => r.json());

                displayDevices(devices);
                displayAisles(aisles);
                displayProducts(fullSync.products);
                displayChecks(fullSync.checks);
                displayHistory(history);
                updateTabCounts(devices, aisles, fullSync, history);

                lastRefresh = new Date();
                updateRefreshTime();
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function updateTabCounts(devices, aisles, fullSync, history) {
            const deviceCount = devices.devices ? devices.devices.length : 0;
            const aisleCount = aisles ? aisles.length : 0;
            const productCount = fullSync.products ? fullSync.products.length : 0;
            const checkCount = fullSync.checks ? fullSync.checks.length : 0;
            const historyCount = history.history ? history.history.length : 0;

            document.getElementById('count-appareils').textContent = deviceCount;
            document.getElementById('count-rayons').textContent = aisleCount;
            document.getElementById('count-produits').textContent = productCount;
            document.getElementById('count-verifications').textContent = checkCount;
            document.getElementById('count-historique').textContent = historyCount;
        }

        function updateRefreshTime() {
            if (lastRefresh) {
                const time = lastRefresh.toLocaleTimeString('fr-FR');
                document.getElementById('refreshTime').textContent = `Mis à jour: ${time}`;
            }
        }

        function displayStats(fullSync, devices, aisles) {
            const stats = document.getElementById('stats');
            const deviceCount = devices.devices ? devices.devices.length : 0;
            const productCount = fullSync.products ? fullSync.products.length : 0;
            const checkCount = fullSync.checks ? fullSync.checks.length : 0;
            const aisleCount = aisles ? aisles.length : 0;

            stats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">Produits</div>
                    <div class="stat-number">${productCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Rayons</div>
                    <div class="stat-number">${aisleCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Vérifications</div>
                    <div class="stat-number">${checkCount}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Appareils</div>
                    <div class="stat-number">${deviceCount}</div>
                </div>
            `;
        }

        function displayDevices(data) {
            const devices = document.getElementById('devices');
            const deviceList = data.devices || [];

            if (deviceList.length === 0) {
                devices.innerHTML = '<div class="empty">Aucun appareil enregistré</div>';
                return;
            }

            let html = '';
            for (const device of deviceList) {
                const lastSeen = device.last_seen ? new Date(device.last_seen).toLocaleString('fr-FR') : 'N/A';
                const isActive = device.is_active ? 'Actif' : 'Inactif';
                const statusClass = device.is_active ? 'status-active' : 'status-offline';

                html += `
                    <div class="device-item">
                        <div class="device-name">${device.device_name}</div>
                        <div class="device-detail">🆔 <code>${device.device_id}</code></div>
                        <div class="device-detail">📱 ${device.app_version}</div>
                        <div class="device-detail">⏱️ ${lastSeen}</div>
                        <div class="device-detail">
                            <span class="status-badge ${statusClass}">${isActive}</span>
                        </div>
                    </div>
                `;
            }
            devices.innerHTML = html;
        }

        function displayAisles(aisles) {
            const container = document.getElementById('aislesList');
            const aislelist = aisles || [];

            if (aislelist.length === 0) {
                container.innerHTML = '<div class="empty">Aucun rayon</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < aislelist.length; i++) {
                const aisle = aislelist[i];
                const isFirst = i === 0;
                const isLast = i === aislelist.length - 1;

                html += `
                    <div class="aisle-item" draggable="true" data-id="${aisle.id}" data-order="${aisle.order_index}">
                        <div class="aisle-content">
                            <div class="aisle-drag-handle">⋮⋮</div>
                            <div class="aisle-info">
                                <div class="aisle-name" onclick="editAisleName(${aisle.id}, '${aisle.name.replace(/'/g, "\\'")}')">
                                    ${aisle.name}
                                    <span style="color: #999; font-size: 11px; margin-left: 5px;">(cliquez pour éditer)</span>
                                </div>
                                <div class="aisle-order">Ordre: ${aisle.order_index}</div>
                            </div>
                        </div>
                        <div class="aisle-buttons">
                            <button class="btn-move" onclick="moveAisleUp(${aisle.id})" ${isFirst ? 'disabled' : ''}>⬆️</button>
                            <button class="btn-move" onclick="moveAisleDown(${aisle.id})" ${isLast ? 'disabled' : ''}>⬇️</button>
                            <button class="btn-delete" onclick="deleteAisle(${aisle.id})">🗑️ Supprimer</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            setupDragAndDrop();
            updateAisleButtonStates();
        }

        function displayProducts(products) {
            const container = document.getElementById('products');
            const productList = products || [];

            if (productList.length === 0) {
                container.innerHTML = '<div class="empty">Aucun produit</div>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Nom</th><th>Catégorie</th><th>Code-barres</th></tr></thead><tbody>';
            for (const product of productList.slice(0, 100)) {
                html += `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>${product.barcode || '-'}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function displayChecks(checks) {
            const container = document.getElementById('checks');
            const checkList = checks || [];

            if (checkList.length === 0) {
                container.innerHTML = '<div class="empty">Aucune vérification</div>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Produit</th><th>Date</th><th>Statut</th><th>DLC</th></tr></thead><tbody>';
            for (const check of checkList.slice(0, 100)) {
                const statusClass = check.status === 'ok' ? '✅' : '❌';
                html += `
                    <tr>
                        <td>${check.id}</td>
                        <td>${check.product_id}</td>
                        <td>${check.check_date}</td>
                        <td>${statusClass} ${check.status}</td>
                        <td>${check.next_expiry_date || '-'}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function displayHistory(data) {
            const container = document.getElementById('history');
            const history = data.history || [];

            if (history.length === 0) {
                container.innerHTML = '<div class="empty">Aucun historique</div>';
                return;
            }

            let html = '<table><thead><tr><th>Appareil</th><th>Table</th><th>Op</th><th>ID</th><th>Date</th></tr></thead><tbody>';
            for (const entry of history.slice(0, 100)) {
                const date = new Date(entry.created_at).toLocaleString('fr-FR');
                const op = entry.operation === 'CREATE' ? '➕' : entry.operation === 'UPDATE' ? '✏️' : '🗑️';
                const deviceId = entry.device_id.substring(0, 8);
                html += `
                    <tr>
                        <td><code>${deviceId}...</code></td>
                        <td>${entry.table_name}</td>
                        <td>${op}</td>
                        <td>${entry.entity_id}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        let draggedElement = null;

        function setupDragAndDrop() {
            const items = document.querySelectorAll('.aisle-item');
            items.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', (e) => {
                    item.classList.remove('dragging');
                    items.forEach(i => i.classList.remove('drag-over'));
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (item !== draggedElement) {
                        item.classList.add('drag-over');
                    }
                });

                item.addEventListener('dragleave', (e) => {
                    item.classList.remove('drag-over');
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (item !== draggedElement) {
                        swapAisles(draggedElement, item);
                    }
                });
            });
        }

        function swapAisles(fromItem, toItem) {
            const parent = fromItem.parentNode;

            // Déplacer l'élément dans le DOM
            if (parseInt(fromItem.dataset.order) < parseInt(toItem.dataset.order)) {
                toItem.parentNode.insertBefore(fromItem, toItem.nextSibling);
            } else {
                toItem.parentNode.insertBefore(fromItem, toItem);
            }

            // Renuméroter TOUS les rayons selon leur nouvelle position
            const allItems = document.querySelectorAll('.aisle-item');
            let order = 1;
            for (const item of allItems) {
                const id = parseInt(item.dataset.id);
                item.dataset.order = order;
                item.querySelector('.aisle-order').textContent = `Ordre: ${order}`;

                // Mettre à jour sur le serveur
                updateAisleOrder(id, order);
                order++;
            }

            // Mettre à jour les états des boutons
            updateAisleButtonStates();
        }

        function updateAisleButtonStates() {
            const allItems = document.querySelectorAll('.aisle-item');

            allItems.forEach((item, index) => {
                const buttons = item.querySelectorAll('.btn-move');
                const upBtn = buttons[0];
                const downBtn = buttons[1];

                // Désactiver le bouton up si c'est le premier
                if (index === 0) {
                    upBtn.disabled = true;
                } else {
                    upBtn.disabled = false;
                }

                // Désactiver le bouton down si c'est le dernier
                if (index === allItems.length - 1) {
                    downBtn.disabled = true;
                } else {
                    downBtn.disabled = false;
                }
            });
        }

        async function moveAisleUp(id) {
            const allItems = document.querySelectorAll('.aisle-item');
            let currentIndex = -1;

            // Trouver l'index de l'aisle actuel
            for (let i = 0; i < allItems.length; i++) {
                if (parseInt(allItems[i].dataset.id) === id) {
                    currentIndex = i;
                    break;
                }
            }

            // Ne rien faire si c'est le premier ou si non trouvé
            if (currentIndex <= 0) return;

            // Swapper avec le précédent
            const currentItem = allItems[currentIndex];
            const previousItem = allItems[currentIndex - 1];
            currentItem.parentNode.insertBefore(currentItem, previousItem);

            // Renuméroter tous les rayons
            let order = 1;
            for (const item of document.querySelectorAll('.aisle-item')) {
                const itemId = parseInt(item.dataset.id);
                item.dataset.order = order;
                item.querySelector('.aisle-order').textContent = `Ordre: ${order}`;
                updateAisleOrder(itemId, order);
                order++;
            }

            // Mettre à jour les états des boutons
            updateAisleButtonStates();
        }

        async function moveAisleDown(id) {
            const allItems = document.querySelectorAll('.aisle-item');
            let currentIndex = -1;

            // Trouver l'index de l'aisle actuel
            for (let i = 0; i < allItems.length; i++) {
                if (parseInt(allItems[i].dataset.id) === id) {
                    currentIndex = i;
                    break;
                }
            }

            // Ne rien faire si c'est le dernier ou si non trouvé
            if (currentIndex < 0 || currentIndex >= allItems.length - 1) return;

            // Swapper avec le suivant
            const currentItem = allItems[currentIndex];
            const nextItem = allItems[currentIndex + 1];
            currentItem.parentNode.insertBefore(nextItem, currentItem);

            // Renuméroter tous les rayons
            let order = 1;
            for (const item of document.querySelectorAll('.aisle-item')) {
                const itemId = parseInt(item.dataset.id);
                item.dataset.order = order;
                item.querySelector('.aisle-order').textContent = `Ordre: ${order}`;
                updateAisleOrder(itemId, order);
                order++;
            }

            // Mettre à jour les états des boutons
            updateAisleButtonStates();
        }

        async function addAisle() {
            const input = document.getElementById('aisleNameInput');
            const name = input.value.trim();

            if (!name) {
                alert('Veuillez entrer un nom de rayon');
                return;
            }

            try {
                const token = await getToken();

                // Récupérer le nombre de rayons existants pour l'ordre
                const aisList = document.querySelectorAll('.aisle-item');
                const nextOrder = aisList.length + 1;

                const response = await fetch('/api/aisles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        name,
                        order_index: nextOrder
                    })
                });

                if (response.ok) {
                    input.value = '';
                    await loadAllData();
                } else {
                    alert('Erreur lors de la création du rayon');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function deleteAisle(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce rayon ?')) {
                return;
            }

            try {
                const token = await getToken();
                const response = await fetch(`/api/aisles/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    await loadAllData();
                } else {
                    alert('Erreur lors de la suppression');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function updateAisleOrder(id, order) {
            try {
                const token = await getToken();
                await fetch(`/api/aisles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ order_index: order })
                });
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function editAisleName(id, currentName) {
            const newName = prompt('Nouveau nom du rayon:', currentName);
            if (newName !== null && newName.trim()) {
                updateAisleName(id, newName.trim());
            }
        }

        async function updateAisleName(id, name) {
            try {
                const token = await getToken();
                const response = await fetch(`/api/aisles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name })
                });

                if (response.ok) {
                    await loadAllData();
                } else {
                    alert('Erreur lors de la modification');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion');
            }
        }

        async function getToken() {
            // For back office, we use the hardcoded token
            // In production, implement proper authentication
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: 'Honfleur', password: 'Honfleur' })
            });
            const data = await response.json();
            return data.token;
        }

        // Charger au démarrage
        window.addEventListener('load', () => {
            loadAllData();

            // Event listener pour la touche Entrée dans le champ d'ajout de rayon
            const aisleInput = document.getElementById('aisleNameInput');
            if (aisleInput) {
                aisleInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        addAisle();
                    }
                });
            }
        });

        // Auto-refresh toutes les 30 secondes
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
